<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narrative Transition</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #e9e8e7; }
    #bg-frame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; opacity: 0.15; pointer-events: none;
    }
    #text-wrap {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.45em;
      background: rgba(233,232,231,0.8);
      padding: 0 10%; text-align: center;
      opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards;
      font-family: Arial, "Segoe UI", sans-serif;
    }
    .line1 { font-size: clamp(2rem, 5vw, 4.5rem); font-weight: 700; color: #515254; line-height: 1.2; }
    .line2 { font-size: clamp(1.4rem, 3.2vw, 3rem); font-weight: 400; color: #515254; line-height: 1.35; }
    .highlight { color: #F4633A; font-weight: 700; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <iframe id="bg-frame" src="headline-facts.html" title="background"></iframe>
  <div id="text-wrap">
    <div class="line1">However, this doesn&rsquo;t tell the whole story&hellip;</div>
    <div class="line2">because of the <span class="highlight">increase in the number of reporting bodies</span></div>
  </div>
</body>
</html>
