<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narrative Transition</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #f9fafb; }
    #bg-frame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; opacity: 0.15; pointer-events: none;
    }
    #text-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(249,250,251,0.8);
      padding: 0 10%; text-align: center;
      opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards;
      font-family: Arial, "Segoe UI", sans-serif;
    }
    .line1 { font-size: clamp(1.5rem, 3.2vw, 3.2rem); font-weight: 700; color: #111827; line-height: 1.35; }
    .good { color: #22c55e; }
    .bad  { color: #F4633A; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <iframe id="bg-frame" src="emissions-trend.html" title="background"></iframe>
  <div id="text-wrap">
    <div class="line1">Whereas supply chain emissions have <span class="bad">increased</span>, other emissions have <span class="good">reduced</span> or stayed the same</div>
  </div>
</body>
</html>
