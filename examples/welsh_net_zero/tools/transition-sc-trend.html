<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Narrative Transition</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
    #bg-frame {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none; opacity: 0.15; pointer-events: none;
    }
    #text-wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(248,250,252,0.8);
      padding: 0 10%; text-align: center;
      opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards;
      font-family: "Segoe UI", "IBM Plex Sans", sans-serif;
    }
    .line1 { font-size: clamp(1.4rem, 3vw, 3rem); font-weight: 700; color: #111827; line-height: 1.4; }
    .highlight { color: #F4633A; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <iframe id="bg-frame" src="supply-chain-blocks.html" title="background"></iframe>
  <div id="text-wrap">
    <div class="line1">The change in reported supply chain emissions is driven partially by a <span class="highlight">1% increase in total spend</span> across all organisations</div>
  </div>
</body>
</html>
